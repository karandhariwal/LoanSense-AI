name: loansense_ai
description: "Intelligent loan document analysis platform focused on Indian borrowers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  provider: ^6.0.5
  dio: ^5.3.3
  file_picker: ^11.0.0
  flutter_spinkit: ^5.2.0
  glassmorphism: ^3.0.0
  lottie: ^2.7.0
  intl: ^0.18.1
  path_provider: ^2.1.1
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/
