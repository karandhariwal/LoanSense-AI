name: loansense_ai
description: "Intelligent loan document analysis platform focused on Indian borrowers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  provider: ^6.0.5
  dio: ^5.3.3
  file_picker: ^11.0.0
  flutter_spinkit: ^5.2.0
  glassmorphism: ^3.0.0
  lottie: ^2.7.0
  intl: ^0.18.1
  path_provider: ^2.1.1
  path: ^1.9.1
  flutter_riverpod: ^2.4.9
  shared_preferences: ^2.2.2
  open_file: ^3.3.2
  permission_handler: ^11.3.1
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0
  mocktail: ^1.0.2
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/images/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_icon.png"
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
  macos:
    generate: true
    image_path: "assets/images/app_icon.png"
  windows:
    generate: true
    image_path: "assets/images/app_icon.png"
