<style>
        .scanline {
            background: linear-gradient(to bottom, transparent 0%, rgba(195, 198, 215, 0.05) 50%, transparent 100%);
            height: 100px;
            width: 100%;
            position: absolute;
            top: -100px;
            animation: scan 4s linear infinite;
            z-index: 5;
        }
        @keyframes scan {
            0% { top: -100px; }
            100% { top: 100vh; }
        }
        .ai-glow {
            box-shadow: 0 0 40px rgba(195, 198, 215, 0.2), 0 0 80px rgba(195, 198, 215, 0.1);
        }
        .float {
            animation: floating 6s ease-in-out infinite;
        }
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .particle {
            position: absolute;
            background: #c3c6d7;
            border-radius: 50%;
            opacity: 0.3;
            filter: blur(1px);
        }
        .loader-bar {
            width: 0%;
            animation: load 3s ease-in-out infinite;
        }
        @keyframes load {
            0% { width: 0%; left: 0; }
            50% { width: 100%; left: 0; }
            100% { width: 0%; left: 100%; }
        }
    </style>
<style>
